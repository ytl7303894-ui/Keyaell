name: Deploy Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create JSON files
      run: |
        python -c "import json; [open(f, 'w').write(json.dumps({})) for f in ['keys.json', 'users.json', 'pending_payments.json', 'orders.json', 'owner_keys.json']]"
        mkdir -p screenshots
    
    - name: Create .env file from secrets
      run: |
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
        echo "OWNER_ID=${{ secrets.OWNER_ID }}" >> .env
        echo "ENVIRONMENT=production" >> .env
    
    - name: Test configuration
      run: |
        python -c "import os; print('Environment file created successfully')"
    
    - name: Run bot
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: |
        nohup python bot.py > bot.log 2>&1 &
        sleep 10
        if pgrep -f "python bot.py" > /dev/null; then
          echo "✅ Bot started successfully!"
        else
          echo "❌ Bot failed to start"
          cat bot.log
          exit 1
        fi
    
    - name: Upload logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs
        path: |
          bot.log
          *.json
          screenshots/
